apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tienda-backend
  namespace: user18
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tienda-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
