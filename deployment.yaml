apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend
  namespace: user18
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tienda-backend
  template:
    metadata:
      labels:
        app: tienda-backend
    spec:
      containers:
      - name: backend
        image: localhost:5000/tienda-backend:eks-v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
